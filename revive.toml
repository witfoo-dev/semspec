# Semspec Revive Configuration
# Standard Go linting rules

ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
warningCode = 0

[rule.blank-imports]
[rule.context-as-argument]
  arguments = [{allowTypesBefore = "*testing.T,*testing.B"}]
[rule.context-keys-type]
[rule.dot-imports]
[rule.error-return]
[rule.error-strings]
[rule.error-naming]
[rule.exported]
[rule.if-return]
[rule.increment-decrement]
[rule.var-naming]
[rule.var-declaration]
[rule.package-comments]
[rule.range]
[rule.receiver-naming]
[rule.time-naming]
[rule.unexported-return]
[rule.indent-error-flow]
[rule.errorf]
[rule.empty-block]
[rule.superfluous-else]
[rule.unused-parameter]
[rule.unreachable-code]
[rule.redefines-builtin-id]

# Disabled: Line length checks can be overly restrictive for struct tags
# [rule.line-length-limit]
#   arguments = [120]

[rule.function-length]
  arguments = [50, 0]

[rule.max-public-structs]
  arguments = [10]
  # E2E test infrastructure has many DTOs for structured results
  # Workflow packages have multiple coordinating types by design
  exclude = ["**/test/e2e/**", "**/workflow/**", "**/source/types.go",
            "**/processor/context-builder/types.go",
            "**/processor/context-builder/strategies/strategy.go",
            "**/processor/workflow-api/http.go",
            "**/processor/project-api/http.go",
            "**/vocabulary/**",
            "**/cmd/openapi-generator/**",
            "**/tools/sandbox/client.go",
            "**/cmd/sandbox/server.go"]
