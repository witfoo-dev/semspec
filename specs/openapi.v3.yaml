            description: Returns the full LLM call record for a specific request, including messages, token usage, and timing
            tags:
                - Trajectory
            parameters:
                - name: request_id
                  in: path
                  required: true
                  description: LLM request identifier returned in the call response
                  schema:
                    type: string
            responses:
                "200":
                    description: Full LLM call record
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CallRecord'
                "404":
                    description: Call record not found
                "503":
                    description: Trajectory service unavailable
    /trajectory-api/context-stats:
        get:
            summary: Get context utilization stats
            description: Returns context window utilization metrics for a trace or workflow. At least one of trace_id or workflow must be provided.
            tags:
                - Trajectory
            parameters:
                - name: trace_id
                  in: query
                  description: Filter stats to a specific trace
                  schema:
                    type: string
                - name: workflow
                  in: query
                  description: Filter stats to a specific workflow slug
                  schema:
                    type: string
                - name: capability
                  in: query
                  description: Filter stats to a specific capability (e.g. planning, coding)
                  schema:
                    type: string
                - name: format
                  in: query
                  description: 'Response format: "summary" (default) or "json" (includes full entry details)'
                  schema:
                    type: string
            responses:
                "200":
                    description: Context utilization statistics with per-capability breakdown
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ContextStats'
                "400":
                    description: Neither trace_id nor workflow query parameter was provided
                "503":
                    description: Trajectory service unavailable
    /trajectory-api/loops/{loop_id}:
        get:
            summary: Get loop trajectory
            description: Returns the LLM call trajectory for a specific agent loop, including token usage and timing per step
            tags:
                - Trajectory
            parameters:
                - name: loop_id
                  in: path
                  required: true
                  description: Agent loop identifier
                  schema:
                    type: string
                - name: format
                  in: query
                  description: 'Response format: "summary" (default) or "json" (includes full entry details)'
                  schema:
                    type: string
            responses:
                "200":
                    description: Trajectory for the given loop
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Trajectory'
                "404":
                    description: Loop not found
                "503":
                    description: Trajectory service unavailable
    /trajectory-api/traces/{trace_id}:
        get:
            summary: Get trace trajectory
            description: Returns aggregated LLM call trajectory for all loops within a trace
            tags:
                - Trajectory
            parameters:
                - name: trace_id
                  in: path
                  required: true
                  description: Trace correlation identifier
                  schema:
                    type: string
                - name: format
                  in: query
                  description: 'Response format: "summary" (default) or "json" (includes full entry details)'
                  schema:
                    type: string
            responses:
                "200":
                    description: Aggregated trajectory for the given trace
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Trajectory'
                "404":
                    description: Trace not found
                "503":
                    description: Trajectory service unavailable
    /trajectory-api/workflows/{slug}:
        get:
            summary: Get workflow trajectory
            description: Returns LLM call trajectory aggregated across all phases and agent loops for an entire workflow
            tags:
                - Trajectory
            parameters:
                - name: slug
                  in: path
                  required: true
                  description: URL-friendly plan identifier
                  schema:
                    type: string
            responses:
                "200":
                    description: Workflow-level trajectory with phase breakdown and aggregate metrics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowTrajectory'
                "404":
                    description: Workflow not found
                "503":
                    description: Trajectory service unavailable
    /types:
        get:
            summary: List available component types
            description: Returns array of component metadata including schemas
            tags:
                - Components
            responses:
                "200":
                    description: Array of component types
                    content:
                        application/json:
                            schema:
                                type: object
    /types/{id}:
        get:
            summary: Get component type by ID
            description: Returns metadata and schema for a specific component type
            tags:
                - Components
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Component type ID
                  schema:
                    type: string
            responses:
                "200":
                    description: Component type metadata
                    content:
                        application/json:
                            schema:
                                type: object
                "404":
                    description: Component type not found
    /validate:
        get:
            summary: Validate component flow connectivity
            description: Performs FlowGraph connectivity analysis for operational validation (used by E2E tests)
            tags:
                - Components
                - FlowGraph
            responses:
                "200":
                    description: Flow connectivity analysis results
                    content:
                        application/json:
                            schema:
                                type: object
