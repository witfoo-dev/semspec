services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4322:4222"
      - "8322:8222"
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  semsource:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_WS_BIND=0.0.0.0:7890
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../../docker/semsource.json:/etc/semsource/semsource.json:ro
      - ../../test/e2e/workspace:/workspace:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3

  semspec:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    ports:
      - "8180:8080"
      # graph-gateway registers handlers with the service manager at /graph-gateway/*
      # standalone :8082 is for unit test support only, not needed in e2e
    command: ["--config", "/app/configs/e2e.json", "--repo", "/workspace", "--log-level", "${LOG_LEVEL:-info}"]
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSPEC_REPO_PATH=/workspace
      - LLM_API_URL=http://host.docker.internal:11434
      - SANDBOX_URL=http://sandbox:8090
      - SEMSOURCE_URL=http://semsource:8080
    volumes:
      - ../../test/e2e/workspace:/workspace
    depends_on:
      nats:
        condition: service_healthy
      semsource:
        condition: service_healthy
    healthcheck:
      # Internal port stays 8080, external mapping is 8180
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  sandbox:
    build:
      context: ../..
      dockerfile: docker/sandbox.Dockerfile
    ports:
      - "8190:8090"
    command: ["--addr", ":8090", "--repo", "/workspace"]
    volumes:
      - ../../test/e2e/workspace:/workspace
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
          pids: 256
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  nats-data:

networks:
  default:
    name: semspec-e2e
