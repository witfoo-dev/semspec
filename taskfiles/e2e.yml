version: "3"

# DEBUG=1 sets LOG_LEVEL=debug for semspec container (e.g., DEBUG=1 task e2e:mock -- hello-world)
# LOG_LEVEL can also be set directly (e.g., LOG_LEVEL=debug task e2e:mock -- hello-world)
env:
  LOG_LEVEL:
    sh: 'if [ -n "$DEBUG" ]; then echo debug; else echo "${LOG_LEVEL:-info}"; fi'

tasks:
  # ============================================================================
  # Internal Build Tasks (not shown in --list)
  # ============================================================================

  build:
    internal: true
    desc: Build e2e test runner and semspec binary (with race detector)
    cmds:
      - echo "[BUILD] Building semspec binary (race enabled)..."
      - go build -race -o bin/semspec ./cmd/semspec
      - echo "[BUILD] Building e2e test runner (race enabled)..."
      - go build -race -o bin/e2e ./cmd/e2e
      - echo "[OK] Build complete"

  build-image:
    internal: true
    desc: Build semspec Docker image for E2E tests
    cmds:
      - echo "[BUILD-IMAGE] Building semspec Docker image..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml build semspec
      - echo "[OK] Docker image built"

  check-ports:
    internal: true
    desc: Check if required backend E2E ports are available (auto-cleans stale containers)
    silent: false
    cmds:
      - |
        echo "[CHECK] Verifying backend E2E ports are available..."
        STALE=false
        for port in 4322 8322 8180 11535; do
          if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
            STALE=true
            break
          fi
        done
        if [ "$STALE" = "true" ]; then
          echo "[CHECK] Stale containers detected — auto-cleaning..."
          docker compose -p semspec-e2e -f docker/compose/e2e.yml down -v --timeout 5 2>/dev/null || true
          docker ps -a --filter name=semspec-e2e --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null || true
          docker network ls -q --filter name=semspec-e2e | xargs -r docker network rm 2>/dev/null || true
          sleep 2
          # Verify ports are now free
          for port in 4322 8322 8180 11535; do
            if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
              echo "[ERROR] Port $port still in use after cleanup:"
              lsof -Pi :$port -sTCP:LISTEN
              echo ""
              echo "Hint: Manually kill the process or restart Docker Desktop."
              exit 1
            fi
          done
          echo "[OK] Stale containers cleaned, ports now available"
        else
          echo "[OK] All backend E2E ports available (4322, 8322, 8180, 11535)"
        fi

  check-ports:ui:
    internal: true
    desc: Check if required UI E2E ports are available (auto-cleans stale containers)
    silent: false
    cmds:
      - |
        echo "[CHECK] Verifying UI E2E ports are available..."
        STALE=false
        for port in 3000 4223 8223 11534; do
          if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
            STALE=true
            break
          fi
        done
        if [ "$STALE" = "true" ]; then
          echo "[CHECK] Stale UI containers detected — auto-cleaning..."
          docker compose -p semspec-ui-e2e -f ui/docker-compose.e2e.yml down -v --timeout 5 2>/dev/null || true
          docker ps -a --filter name=semspec-ui-e2e --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null || true
          sleep 2
          for port in 3000 4223 8223 11534; do
            if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
              echo "[ERROR] Port $port still in use after cleanup."
              exit 1
            fi
          done
          echo "[OK] Stale UI containers cleaned, ports now available"
        else
          echo "[OK] All UI E2E ports available (3000, 4223, 8223, 11534)"
        fi

  clean:
    internal: true
    desc: Clean E2E Docker environment
    silent: false
    cmds:
      - echo "[CLEAN] Cleaning Semspec E2E Docker environment..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml down -v --timeout 15 2>/dev/null || true
      - docker rm -f nats-semspec 2>/dev/null || true
      - docker volume ls -q --filter name=semspec | xargs -r docker volume rm 2>/dev/null || true
      - docker network ls -q --filter name=semspec-e2e | xargs -r docker network rm 2>/dev/null || true
      - echo "[OK] Docker environment cleaned"

  clean-workspace:
    internal: true
    desc: Clean E2E workspace
    silent: false
    cmds:
      - echo "[CLEAN-WORKSPACE] Cleaning test workspace..."
      - docker run --rm -v $(pwd)/test/e2e/workspace:/workspace alpine sh -c "rm -rf /workspace/* /workspace/.semspec 2>/dev/null; ls -la /workspace/" || true
      - echo "[OK] Workspace cleaned"

  cleanup:
    internal: true
    desc: Post-test cleanup (called by defer)
    cmds:
      - echo "[E2E CLEANUP] Stopping infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml down -v --timeout 15 2>/dev/null || true
      - echo "[OK] Cleanup complete"


  build-mock-image:
    internal: true
    desc: Build mock-llm Docker image for E2E tests
    cmds:
      - echo "[BUILD-IMAGE] Building mock-llm Docker image..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml build mock-llm
      - echo "[OK] Mock LLM image built"

  cleanup-mock:
    internal: true
    desc: Post-test cleanup for mock E2E tests (called by defer)
    cmds:
      - echo "[E2E CLEANUP] Stopping mock infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml down -v --timeout 15 2>/dev/null || true
      - echo "[OK] Cleanup complete"

  cleanup-mock-pressure:
    internal: true
    desc: Post-test cleanup for mock pressure E2E tests (called by defer)
    cmds:
      - echo "[E2E CLEANUP] Stopping mock pressure infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml -f docker/compose/e2e-mock-pressure.yml down -v --timeout 15 2>/dev/null || true
      - echo "[OK] Cleanup complete"


  # ============================================================================
  # Infrastructure Tasks
  # ============================================================================

  up:
    desc: Start e2e infrastructure (NATS + semspec)
    deps: [build-image]
    cmds:
      - echo "[E2E UP] Starting infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml up -d --wait
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml ps
      - echo "[OK] Infrastructure ready"

  down:
    desc: Stop e2e infrastructure and remove volumes
    cmds:
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml down -v --timeout 15

  down:keep:
    desc: Stop e2e infrastructure but preserve volumes
    cmds:
      - echo "[DOWN:KEEP] Stopping infrastructure (volumes preserved)..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml down --timeout 15
      - echo "[DOWN:KEEP] Use 'task e2e:down' to remove volumes."

  logs:
    desc: Show logs from e2e services
    cmds:
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml logs -f

  watch:
    desc: Stream errors and warnings from semspec container
    cmds:
      - echo "[WATCH] Streaming ERROR/WARN logs (Ctrl+C to stop)..."
      - docker logs -f semspec-e2e-semspec-1 2>&1 | grep -E "(ERROR|WARN|error|warn|panic|fatal)" --line-buffered

  status:
    desc: Check status of e2e infrastructure
    cmds:
      - echo "[STATUS] Docker containers:"
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml ps
      - echo ""
      - echo "[STATUS] NATS health (port 8322):"
      - curl -s http://localhost:8322/healthz || echo "  NATS not available"
      - echo ""
      - echo "[STATUS] Semspec HTTP health (port 8180):"
      - curl -s http://localhost:8180/readyz || echo "  Semspec not available"

  # ============================================================================
  # Test Execution Tasks
  # ============================================================================

  default:
    desc: Run all e2e tests (full lifecycle)
    deps: [clean, clean-workspace, check-ports, build, build-image]
    cmds:
      - echo "[E2E] Starting infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml up -d --wait
      - echo "[E2E] Running tests..."
      - cmd: ./bin/e2e --json --workspace $(pwd)/test/e2e/workspace all
        ignore_error: true
      - defer: { task: cleanup }
      - echo "[E2E] Tests complete"

  run:
    desc: "Run e2e scenario(s) - usage: task e2e:run -- <scenario>"
    deps: [build]
    cmds:
      - ./bin/e2e --workspace $(pwd)/test/e2e/workspace {{.CLI_ARGS | default "all"}}

  run-watch:
    desc: "Run scenario with error streaming - usage: task e2e:run-watch -- <scenario>"
    deps: [build]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'all'
    cmds:
      - |
        echo "[RUN-WATCH] Starting log stream + {{.SCENARIO}}..."
        docker logs -f semspec-e2e-semspec-1 2>&1 | grep -E "(ERROR|WARN|error|warn|panic|fatal)" --line-buffered &
        LOG_PID=$!
        trap "kill $LOG_PID 2>/dev/null" EXIT

        ./bin/e2e --workspace $(pwd)/test/e2e/workspace {{.SCENARIO}}

  debug:
    desc: Start infrastructure for interactive debugging
    deps: [clean, check-ports, build, build-image]
    cmds:
      - echo "[DEBUG] Starting infrastructure for debugging..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml up -d --wait
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml ps
      - echo ""
      - echo "[DEBUG] Useful commands:"
      - echo "  docker logs -f semspec-e2e-semspec-1"
      - echo "  task e2e:run -- plan-workflow"
      - echo "  task e2e:down"
      - echo ""
      - docker logs -f semspec-e2e-semspec-1 &
      - echo "[DEBUG] Press Ctrl+C to stop watching logs"
      - sleep infinity

  # Mock infrastructure management (for debugging)
  up:mock:
    desc: "Start mock infrastructure - usage: task e2e:up:mock -- <scenario>"
    deps: [clean, check-ports, build, build-image, build-mock-image]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'hello-world'
    cmds:
      - |
        echo "[UP:MOCK] Starting mock infrastructure for {{.SCENARIO}}..."
        MOCK_SCENARIO={{.SCENARIO}} docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml up -d --wait
        docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml ps
        echo ""
        echo "[OK] Mock infrastructure ready for scenario: {{.SCENARIO}}"
        echo ""
        echo "Run tests with:  task e2e:mock:run -- {{.SCENARIO}}"
        echo "View logs with:  task e2e:logs:mock"
        echo "Stop with:       task e2e:down:mock"

  down:mock:
    desc: Stop mock infrastructure
    cmds:
      - echo "[DOWN:MOCK] Stopping mock infrastructure..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml down -v --timeout 15
      - echo "[OK] Mock infrastructure stopped"

  logs:mock:
    desc: Show logs from mock e2e services (semspec + mock-llm)
    cmds:
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml logs -f

  status:mock:
    desc: Check status of mock e2e infrastructure
    cmds:
      - echo "[STATUS:MOCK] Docker containers:"
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml ps
      - echo ""
      - echo "[STATUS:MOCK] NATS health (port 8322):"
      - curl -s http://localhost:8322/healthz || echo "  NATS not available"
      - echo ""
      - echo "[STATUS:MOCK] Semspec HTTP health (port 8180):"
      - curl -s http://localhost:8180/readyz || echo "  Semspec not available"
      - echo ""
      - echo "[STATUS:MOCK] Mock LLM health (port 11535):"
      - curl -s http://localhost:11535/health || echo "  Mock LLM not available"

  mock:run:
    desc: "Run scenario against running mock infrastructure - usage: task e2e:mock:run -- <scenario>"
    deps: [build]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'hello-world'
    cmds:
      - |
        echo "[MOCK:RUN] Running {{.SCENARIO}} against existing mock infrastructure..."
        E2E_PROVIDER_NAME=mock ./bin/e2e --json --fast-timeouts --mock-llm http://localhost:11535 --workspace $(pwd)/test/e2e/workspace {{.SCENARIO}}

  debug:mock:
    desc: "Start mock infrastructure and tail logs - usage: task e2e:debug:mock -- <scenario>"
    deps: [clean, check-ports, build, build-image, build-mock-image]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'hello-world'
    cmds:
      - |
        echo "[DEBUG:MOCK] Starting mock infrastructure for {{.SCENARIO}}..."
        MOCK_SCENARIO={{.SCENARIO}} docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml up -d --wait
        docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml ps
        echo ""
        echo "[DEBUG:MOCK] Useful commands:"
        echo "  task e2e:mock:run -- {{.SCENARIO}}"
        echo "  task e2e:status:mock"
        echo "  task e2e:down:mock"
        echo ""
        echo "[DEBUG:MOCK] Tailing semspec logs (Ctrl+C to stop)..."
      - docker logs -f semspec-e2e-semspec-1

  nuke:
    desc: Nuclear cleanup - remove ALL semspec docker resources (backend + UI)
    cmds:
      - echo "[NUKE] Removing ALL Semspec Docker resources..."
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml down -v --timeout 5 2>/dev/null || true
      - docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml down -v --timeout 5 2>/dev/null || true
      - docker compose -p semspec-ui-e2e -f ui/docker-compose.e2e.yml down -v --timeout 5 2>/dev/null || true
      - docker ps -a --filter name=semspec --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null || true
      - docker ps -a --filter name=semspec-e2e --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null || true
      - docker volume ls -q --filter name=semspec | xargs -r docker volume rm 2>/dev/null || true
      - docker network ls -q --filter name=semspec | xargs -r docker network rm 2>/dev/null || true
      - docker images --filter reference='*semspec*' --format "{{.ID}}" | xargs -r docker rmi -f 2>/dev/null || true
      - |
        # Wait for ports to be released (Docker Desktop can hold them briefly).
        echo "[NUKE] Waiting for ports to release..."
        for i in 1 2 3; do
          ALL_FREE=true
          for port in 4322 8322 8180 11535; do
            if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
              ALL_FREE=false
              break
            fi
          done
          if [ "$ALL_FREE" = "true" ]; then
            break
          fi
          sleep 1
        done
      - echo "[OK] Nuclear cleanup complete (backend + UI)"

  mock:
    desc: "Run mock LLM scenario - usage: task e2e:mock -- <scenario>"
    deps: [clean, clean-workspace, check-ports, build, build-image, build-mock-image]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'hello-world'
    cmds:
      - |
        echo "[E2E:MOCK] Scenario: {{.SCENARIO}}"

        # Validate mock fixtures exist for this scenario.
        FIXTURE_DIR="test/e2e/fixtures/mock-responses/{{.SCENARIO}}"
        if [ ! -d "$FIXTURE_DIR" ]; then
          echo "[ERROR] No mock LLM fixtures found at: $FIXTURE_DIR"
          echo ""
          echo "This scenario does not have mock LLM fixtures."
          echo "Use 'task e2e:run -- {{.SCENARIO}}' against running infra instead,"
          echo "or create fixtures in $FIXTURE_DIR."
          echo ""
          echo "Available mock scenarios:"
          ls -1 test/e2e/fixtures/mock-responses/ 2>/dev/null | sed 's/^/  /'
          exit 1
        fi

        echo "[E2E:MOCK] Starting infrastructure with mock LLM..."
        MOCK_SCENARIO={{.SCENARIO}} docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml up -d --wait
      - |
        echo "[E2E:MOCK] Running {{.SCENARIO}} with mock LLM..."
        E2E_PROVIDER_NAME=mock ./bin/e2e --json --fast-timeouts --mock-llm http://localhost:11535 --workspace $(pwd)/test/e2e/workspace {{.SCENARIO}}
      - defer: { task: cleanup-mock }
      - echo "[E2E:MOCK] Complete"

  mock-pressure:
    desc: "Run mock LLM pressure scenario - usage: task e2e:mock-pressure -- <scenario>"
    deps: [clean, clean-workspace, check-ports, build, build-image, build-mock-image]
    vars:
      SCENARIO:
        sh: echo '{{.CLI_ARGS}}' | awk '{print $1}' | grep . || echo 'context-pressure'
    cmds:
      - |
        echo "[E2E:MOCK-PRESSURE] Scenario: {{.SCENARIO}}"
        echo "[E2E:MOCK-PRESSURE] Starting infrastructure with reduced token budget (8192)..."
        MOCK_SCENARIO={{.SCENARIO}} docker compose -p semspec-e2e -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml -f docker/compose/e2e-mock-pressure.yml up -d --wait
      - |
        echo "[E2E:MOCK-PRESSURE] Running {{.SCENARIO}} with mock LLM (pressure config)..."
        E2E_PROVIDER_NAME=mock ./bin/e2e --json --fast-timeouts --mock-llm http://localhost:11535 --workspace $(pwd)/test/e2e/workspace {{.SCENARIO}}
      - defer: { task: cleanup-mock-pressure }
      - echo "[E2E:MOCK-PRESSURE] Complete"

  # ============================================================================
  # UI E2E Testing Tasks
  # ============================================================================

  # ============================================================================
  # UI E2E Testing Tasks (Playwright)
  #
  # All tasks work from the repo root — no need to cd into ui/.
  # Infrastructure is managed automatically.
  #
  # Usage:
  #   task e2e:ui:test              # Run all Playwright tests (infra must be up)
  #   task e2e:ui:test -- --grep @smoke  # Run only smoke tests
  #   task e2e:ui:test:mock         # Full lifecycle: build → start mock stack → test → cleanup
  #   task e2e:ui:test:llm          # Full lifecycle with real LLM (requires LLM_API_URL)
  #   task e2e:ui:mock:up           # Start mock stack for interactive debugging
  #   task e2e:ui:down              # Stop any UI E2E stack
  # ============================================================================

  ui:test:
    desc: "Run Playwright UI tests (stack must be running) — usage: task e2e:ui:test [-- --grep @smoke]"
    dir: ui
    cmds:
      - npx playwright test {{.CLI_ARGS}}

  ui:test:mock:
    desc: "Full lifecycle: build + start mock stack + run all @mock tests + cleanup"
    deps: [check-ports:ui]
    cmds:
      - echo "[UI:TEST:MOCK] Building and starting mock stack..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml down -v --timeout 10 2>/dev/null
        ignore_error: true
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml build
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml up -d --wait
      - echo "[UI:TEST:MOCK] Running @mock Playwright tests..."
      - cmd: cd ui && npx playwright test --grep @mock {{.CLI_ARGS}}
        ignore_error: true
      - defer: { task: ui:cleanup:mock }
      - echo "[UI:TEST:MOCK] Complete"

  ui:test:llm:
    desc: "Full lifecycle: build + start real LLM stack + run @easy tests + cleanup"
    deps: [check-ports:ui]
    cmds:
      - |
        if [ -z "$LLM_API_URL" ]; then
          echo "[ERROR] LLM_API_URL not set. Examples:"
          echo "  LLM_API_URL=http://localhost:11434/v1 task e2e:ui:test:llm                  # Ollama"
          echo "  LLM_API_URL=https://api.anthropic.com/v1 task e2e:ui:test:llm               # Claude"
          echo "  LLM_API_URL=https://generativelanguage.googleapis.com/v1beta task e2e:ui:test:llm  # Gemini"
          echo ""
          echo "API keys are read from environment: ANTHROPIC_API_KEY, GOOGLE_API_KEY, BRAVE_API_KEY"
          exit 1
        fi
      - echo "[UI:TEST:LLM] Building and starting real LLM stack..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml down -v --timeout 10 2>/dev/null
        ignore_error: true
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml build
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml up -d --wait
      - echo "[UI:TEST:LLM] Running @easy Playwright tests (LLM_API_URL=$LLM_API_URL)..."
      - cmd: cd ui && PLAYWRIGHT_TIMEOUT=600000 npx playwright test e2e/plan-lifecycle-llm.spec.ts --project cascade --no-deps {{.CLI_ARGS}}
        ignore_error: true
      - defer: { task: ui:cleanup:llm }
      - echo "[UI:TEST:LLM] Complete"

  ui:llm:up:
    desc: "Start UI E2E stack with real LLM (for interactive debugging)"
    deps: [check-ports:ui]
    cmds:
      - |
        if [ -z "$LLM_API_URL" ]; then
          echo "[ERROR] LLM_API_URL not set."
          exit 1
        fi
      - echo "[UI:LLM:UP] Building and starting real LLM stack..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml down -v --timeout 10 2>/dev/null
        ignore_error: true
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml build
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml up -d --wait
      - |
        echo ""
        echo "[OK] UI E2E real LLM stack ready at http://localhost:3000"
        echo "     LLM_API_URL=$LLM_API_URL"
        echo ""
        echo "Run tests:  task e2e:ui:test -- --grep @easy"
        echo "Stop:       task e2e:ui:down"

  ui:mock:up:
    desc: Start UI E2E Docker stack with mock LLM (for interactive debugging)
    deps: [check-ports:ui]
    cmds:
      - echo "[UI:MOCK:UP] Cleaning stale state..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml down -v --timeout 10 2>/dev/null
        ignore_error: true
      - echo "[UI:MOCK:UP] Building and starting..."
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml build
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml up -d --wait
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml ps
      - |
        echo ""
        echo "[OK] UI E2E mock stack ready at http://localhost:3000"
        echo ""
        echo "Run tests:     task e2e:ui:test -- --grep @mock"
        echo "Playwright UI: task e2e:ui:test -- --ui"
        echo "Stop:          task e2e:ui:down"

  ui:up:
    desc: Start UI E2E Docker stack (real LLM — requires running Ollama or API key)
    deps: [check-ports:ui]
    cmds:
      - echo "[UI:UP] Cleaning stale state..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml down -v --timeout 10 2>/dev/null
        ignore_error: true
      - docker compose -f ui/docker-compose.e2e.yml build
      - docker compose -f ui/docker-compose.e2e.yml up -d --wait
      - docker compose -f ui/docker-compose.e2e.yml ps
      - echo "[OK] UI E2E stack ready at http://localhost:3000"

  ui:down:
    desc: Stop any UI E2E Docker stack
    cmds:
      - echo "[UI:DOWN] Stopping UI E2E stack..."
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml down -v --timeout 15 2>/dev/null
        ignore_error: true
      - cmd: docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml down -v --timeout 15 2>/dev/null
        ignore_error: true
      - cmd: docker compose -f ui/docker-compose.e2e.yml down -v --timeout 15 2>/dev/null
        ignore_error: true
      - echo "[OK] UI E2E stack stopped"

  ui:status:
    desc: Check status of UI E2E infrastructure
    cmds:
      - echo "[STATUS:UI] Docker containers:"
      - docker compose -p semspec-ui-e2e -f ui/docker-compose.e2e.yml ps 2>/dev/null || echo "  UI E2E stack not running"
      - echo ""
      - echo "[STATUS:UI] NATS health (port 4223):"
      - curl -s http://localhost:8223/healthz || echo "  UI NATS not available"
      - echo ""
      - echo "[STATUS:UI] Caddy proxy (port 3000):"
      - curl -s -o /dev/null -w "  HTTP %{http_code}" http://localhost:3000 2>/dev/null || echo "  Caddy not available"
      - echo ""
      - echo "[STATUS:UI] Mock LLM (port 11534):"
      - curl -s http://localhost:11534/health 2>/dev/null | jq -r '.status // "not available"' || echo "  not available"
      - echo ""

  ui:cleanup:
    internal: true
    cmds:
      - docker compose -f ui/docker-compose.e2e.yml down -v --timeout 15 2>/dev/null || true

  ui:cleanup:mock:
    internal: true
    cmds:
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-mock.yml down -v --timeout 15 2>/dev/null || true

  ui:cleanup:llm:
    internal: true
    cmds:
      - docker compose -f ui/docker-compose.e2e.yml -f ui/docker-compose.e2e-llm.yml down -v --timeout 15 2>/dev/null || true

  stacks:
    desc: Show which E2E stacks are running (useful when sharing a machine)
    cmds:
      - |
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║              E2E Stack Status (shared machine)             ║"
        echo "╠══════════════════════════════════════════════════════════════╣"
        echo "║                                                            ║"

        # Backend E2E
        BACKEND_RUNNING=false
        if docker compose -p semspec-e2e -f docker/compose/e2e.yml ps --status running 2>/dev/null | grep -q "running"; then
          BACKEND_RUNNING=true
        fi

        if $BACKEND_RUNNING; then
          echo "║  Backend E2E (semspec-e2e):    ● RUNNING                   ║"
          echo "║    NATS:       localhost:4322                               ║"
          echo "║    HTTP API:   localhost:8180                               ║"
          echo "║    Graph GW:   localhost:8180/graph-gateway                 ║"
        else
          echo "║  Backend E2E (semspec-e2e):    ○ stopped                   ║"
        fi

        echo "║                                                            ║"

        # UI E2E
        UI_RUNNING=false
        if docker compose -p semspec-ui-e2e -f ui/docker-compose.e2e.yml ps --status running 2>/dev/null | grep -q "running"; then
          UI_RUNNING=true
        fi

        if $UI_RUNNING; then
          echo "║  UI E2E (semspec-ui-e2e):      ● RUNNING                   ║"
          echo "║    Caddy:      localhost:3000                               ║"
          echo "║    NATS:       localhost:4223                               ║"
        else
          echo "║  UI E2E (semspec-ui-e2e):      ○ stopped                   ║"
        fi

        echo "║                                                            ║"

        # Production
        PROD_RUNNING=false
        if docker compose -f docker-compose.yml ps --status running 2>/dev/null | grep -q "running"; then
          PROD_RUNNING=true
        fi

        if $PROD_RUNNING; then
          echo "║  Production (semspec):         ● RUNNING                   ║"
          echo "║    Gateway:    localhost:8080                               ║"
          echo "║    NATS:       localhost:4222                               ║"
        else
          echo "║  Production (semspec):         ○ stopped                   ║"
        fi

        echo "║                                                            ║"
        echo "╠══════════════════════════════════════════════════════════════╣"
        echo "║  Port allocation (no conflicts between stacks):            ║"
        echo "║    Backend E2E:  4322, 8322, 8180, 11535                   ║"
        echo "║    UI E2E:       3000, 4223, 8223, 11534                   ║"
        echo "║    Production:   4222, 8222, 8080                          ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
